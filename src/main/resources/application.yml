spring:
  application:
    name: vote-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vote_system}
    username: ${DB_USERNAME:vote}
    password: ${DB_PASSWORD:vote}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
      repositories:
        enabled: false
  cache:
    type: redis
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    time-zone: UTC

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:true}

app:
  cache:
    default-ttl: ${CACHE_DEFAULT_TTL:PT30S}
  security:
    jwt:
      issuer: ${JWT_ISSUER:vote-system}
      secret: ${JWT_SECRET:dev-only-change-me-0123456789abcdef}
      access-token-ttl: ${ACCESS_TOKEN_TTL:PT15M}
    refresh-token:
      ttl: ${REFRESH_TOKEN_TTL:P30D}
      cookie-name: ${REFRESH_COOKIE_NAME:vote_refresh}
      secure: ${REFRESH_COOKIE_SECURE:false}
      same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
