spring:
  application:
    name: vote-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vote_system}
    username: ${DB_USERNAME:vote}
    password: ${DB_PASSWORD:vote}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    time-zone: UTC

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:vote-system}
      secret: ${JWT_SECRET:dev-only-change-me-0123456789abcdef}
      access-token-ttl: PT15M
