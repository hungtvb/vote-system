services:
  postgres:
    image: postgres:17-alpine
    container_name: vote-postgres
    environment:
      POSTGRES_DB: vote_system
      POSTGRES_USER: vote
      POSTGRES_PASSWORD: vote
    ports:
      - "5432:5432"
    volumes:
      - vote-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vote -d vote_system"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: vote-redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - vote-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vote-postgres-data:
  vote-redis-data:
