services:
  - type: web
    name: hungtvb-vote-system
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: vote-system
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REDIS_HEALTH_ENABLED
        value: "false"
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0
